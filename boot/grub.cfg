# Lestra OS GRUB2 Boot Configuration
# Copyright (c) 2026 lestramk.org

set timeout=3
set default=0

# Set colors for Lestra OS branding
set menu_color_normal=cyan/blue
set menu_color_highlight=white/cyan

# Menu entry
menuentry "Lestra OS" {
    multiboot2 /boot/kernel.bin
    module2 /boot/initrd.img initrd
    boot
}

menuentry "Lestra OS (Debug Mode)" {
    multiboot2 /boot/kernel.bin debug
    module2 /boot/initrd.img initrd
    boot
}

menuentry "Lestra OS (Recovery)" {
    multiboot2 /boot/kernel.bin recovery single
    module2 /boot/initrd.img initrd
    boot
}

# Fallback
menuentry "System Information" {
    echo "Lestra OS by lestramk.org"
    echo "Version: 1.0.0-alpha"
    echo "Architecture: x86_64"
    echo "Memory: Detecting..."
    lsmmap
}
